<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Generator - Crea tu sitio web automático</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🎨 Portfolio Generator</h1>
      <p class="subtitle">Crea tu portafolio personal en segundos sin código</p>
    </header>

    <div class="main-content">
      <!-- Sidebar: Formulario -->
      <aside class="sidebar">
        <div class="form-section">
          <h2>📋 Información Personal</h2>
          <form id="portfolioForm">
            <!-- Información básica -->
            <div class="form-group">
              <label for="fullName">Nombre completo</label>
              <input type="text" id="fullName" placeholder="Tu nombre" class="input-field" required>
            </div>

            <div class="form-group">
              <label for="title">Profesión/Título</label>
              <input type="text" id="title" placeholder="Ej: Desarrollador Full Stack" class="input-field" required>
            </div>

            <div class="form-group">
              <label for="bio">Biografía</label>
              <textarea id="bio" placeholder="Cuéntanos sobre ti..." class="input-field"></textarea>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="tu@email.com" class="input-field">
            </div>

            <div class="form-group">
              <label for="phone">Teléfono</label>
              <input type="tel" id="phone" placeholder="+1 234 567 8900" class="input-field">
            </div>

            <div class="form-group">
              <label for="location">Ubicación</label>
              <input type="text" id="location" placeholder="Ciudad, País" class="input-field">
            </div>

            <!-- Proyectos -->
            <div class="section-divider">Proyectos</div>

            <div id="projectsList" class="projects-list"></div>

            <button type="button" class="btn-secondary" id="addProjectBtn">+ Agregar Proyecto</button>

            <!-- Habilidades -->
            <div class="section-divider">Habilidades</div>

            <div class="form-group">
              <label for="skills">Habilidades (separa por comas)</label>
              <textarea id="skills" placeholder="Ej: JavaScript, React, Node.js, CSS3" class="input-field"></textarea>
            </div>

            <!-- Redes Sociales -->
            <div class="section-divider">Redes Sociales</div>

            <div class="form-group">
              <label for="github">GitHub</label>
              <input type="url" id="github" placeholder="https://github.com/username" class="input-field">
            </div>

            <div class="form-group">
              <label for="linkedin">LinkedIn</label>
              <input type="url" id="linkedin" placeholder="https://linkedin.com/in/username" class="input-field">
            </div>

            <div class="form-group">
              <label for="twitter">Twitter</label>
              <input type="url" id="twitter" placeholder="https://twitter.com/username" class="input-field">
            </div>

            <!-- Tema -->
            <div class="section-divider">Tema</div>

            <div class="form-group">
              <label for="theme">Selecciona un tema</label>
              <select id="theme" class="input-field">
                <option value="dark">🌙 Oscuro (Predeterminado)</option>
                <option value="light">☀️ Claro</option>
                <option value="purple">💜 Púrpura</option>
                <option value="green">💚 Verde</option>
              </select>
            </div>

            <button type="submit" class="btn-add">🚀 Generar Portafolio</button>
          </form>
        </div>
      </aside>

      <!-- Vista Previa -->
      <main class="preview-section">
        <div id="portfolio" class="portfolio-preview dark">
          <!-- Preview HTML se genera dinámicamente -->
        </div>
      </main>
    </div>

    <!-- Modal: Agregar Proyecto -->
    <div id="projectModal" class="modal hidden">
      <div class="modal-content">
        <button class="btn-close" id="closeProjectModal">✕</button>
        <h2>Agregar Proyecto</h2>

        <form id="projectForm">
          <div class="form-group">
            <label for="projectTitle">Título del proyecto</label>
            <input type="text" id="projectTitle" placeholder="Nombre del proyecto" class="input-field" required>
          </div>

          <div class="form-group">
            <label for="projectDescription">Descripción</label>
            <textarea id="projectDescription" placeholder="Describe tu proyecto..." class="input-field"></textarea>
          </div>

          <div class="form-group">
            <label for="projectTechnologies">Tecnologías</label>
            <input type="text" id="projectTechnologies" placeholder="React, Node.js, MongoDB" class="input-field">
          </div>

          <div class="form-group">
            <label for="projectLink">Link del proyecto</label>
            <input type="url" id="projectLink" placeholder="https://ejemplo.com" class="input-field">
          </div>

          <div class="button-group">
            <button type="submit" class="btn-add">Guardar Proyecto</button>
            <button type="button" class="btn-secondary" id="cancelProjectBtn">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Notificación -->
    <div id="notification" class="notification hidden">
      <span id="notificationText"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
